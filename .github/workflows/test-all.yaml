name: All test

on:
    push:
        branches: ['master']
    pull_request:
        branches: ['master']

permissions:
    contents: write
    id-token: write
    pull-requests: read

jobs:
    commitlint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.x

            - name: Init enviroument
              run: |
                  pnpm i

            - name: Set commitlint config
              run: |
                  pnpm esbuild --bundle --packages=external --format=esm --platform=node commitlint.config.ts --outfile=config/temp.mjs
                  echo 'export { default as default } from "./config/temp.mjs";' > commitlint.config.mjs

            - uses: wagoid/commitlint-github-action@v6

    test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [22.x, 24.x, 25.x]

        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Init enviroument
              run: |
                  pnpm i

            - name: Test All
              run: |
                  pnpm run ci

